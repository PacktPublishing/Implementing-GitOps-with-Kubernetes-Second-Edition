# Migrated to the vCluster v0.35.1 schema (see ../../../optimization/vcluster/values.yaml).
vcluster:
  sync:
    toHost:
      ingresses:
        enabled: true

  controlPlane:
    proxy:
      # Replaces the old syncer.extraArgs: [--tls-san=...]; signs the
      # vCluster proxy certificate for the external hostname below.
      extraSANs:
        - vcluster-b.example.com
    # A plain Ingress can't express true SSL passthrough with Traefik, so the
    # control plane's own ingress stays disabled - passthrough is handled by
    # the IngressRouteTCP below instead.
    ingress:
      enabled: false

  policies:
    resourceQuota:
      enabled: true
      quota:
        requests.cpu: 10
        requests.memory: 20Gi
        requests.storage: "100Gi"
        requests.ephemeral-storage: 50Gi
        limits.cpu: 20
        limits.memory: 40Gi
        limits.ephemeral-storage: 150Gi
        services.nodeports: 1
        services.loadbalancers: 1
        count/endpoints: 40
        count/pods: 30
        count/services: 30
        count/secrets: 100
        count/configmaps: 100
        count/persistentvolumeclaims: 20

# True SSL passthrough for the vCluster API server via a Traefik IngressRouteTCP.
# service.name defaults to the release name (vcluster-team-b), matching the
# Service the vcluster subchart creates.
ingressRouteTCP:
  enabled: true
  host: vcluster-b.example.com
