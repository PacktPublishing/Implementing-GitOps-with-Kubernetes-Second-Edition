{{- if .Values.ingress -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    # router.tls terminates TLS at Traefik using the cert-manager-issued
    # secret below - it is not true SSL passthrough. Plain Ingress
    # annotations can't express passthrough with Traefik; that needs an
    # IngressRouteTCP (or a TLSRoute on the Gateway API) instead.
    traefik.ingress.kubernetes.io/router.tls: {{ .Values.ingress.routerTLS | default "true" | quote }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.issuer }}
    cert-manager.io/renew-before: 360h #15 days
    cert-manager.io/common-name: {{ .Values.ingress.host }}
    kubernetes.io/tls-acme: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: "https"
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd
                port:
                  name: https
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.secretName | default "argocd-secret" }}  # do not change, this is provided by Argo CD
{{- end -}}