ingress:
  host: "argocd.yourdomain.com"
  issuer: "letsencrypt"
  className: "traefik"
  routerTLS: "true" # TLS terminated at Traefik, not passthrough - see templates/ingress.yaml

argo-cd:
  redis:
    enabled: true # renamed from "create" in argo-helm v6+

  controller:
    replicas: 1

  server:
    replicas: 2

  repoServer:
    replicas: 2

  applicationSet:
    replicas: 2 # renamed from "replicaCount" in argo-helm v6+
