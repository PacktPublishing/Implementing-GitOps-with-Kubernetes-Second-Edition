# Alternative to gitrepository-sealed.yaml when a managed secret backend
# (here: Azure Key Vault) is available. This SecretStore is namespace-scoped
# to dev-team-b, which is what forms the tenant boundary: the platform team
# provisions the connection/authentication once, and dev-team-b can only
# ever fetch secrets through this store, never another team's.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: dev-team-b-azure-keyvault
  namespace: dev-team-b
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://dev-team-b-kv.vault.azure.net"
      serviceAccountRef:
        name: dev-team-b-external-secrets
