# References secret-store.yaml and declares which entries to fetch and
# materialize as a Kubernetes Secret. Git only ever holds this reference,
# never the plaintext value - the same Argo CD repo-credential Secret that
# gitrepository-sealed.yaml produces via sealed-secrets, produced here via
# the External Secrets Operator instead.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: application-dev-team-a
  namespace: dev-team-a
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dev-team-a-azure-keyvault
    kind: SecretStore
  target:
    name: application-dev-team-a
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        url: "{{ .url }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: url
      remoteRef:
        key: dev-team-a-application-url
    - secretKey: username
      remoteRef:
        key: dev-team-a-application-username
    - secretKey: password
      remoteRef:
        key: dev-team-a-application-password
